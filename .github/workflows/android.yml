name: Android CI

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Run unit tests
        run: ./gradlew test

      - name: Run lint
        run: ./gradlew lint
        continue-on-error: true

      - name: Run detekt
        run: ./gradlew detekt
        continue-on-error: true

      - name: Run kover reports
        run: ./gradlew koverHtmlReport koverXmlReport
        continue-on-error: true

      - name: Validate version format
        run: ./gradlew validateVersion

      - name: Upload host debug APK
        uses: actions/upload-artifact@v4
        with:
          name: host-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload host release APK
        uses: actions/upload-artifact@v4
        with:
          name: host-release-unsigned
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 90

      - name: Upload client debug APK
        uses: actions/upload-artifact@v4
        with:
          name: client-debug
          path: client/build/outputs/apk/debug/client-debug.apk
          retention-days: 30

      - name: Upload client release APK
        uses: actions/upload-artifact@v4
        with:
          name: client-release-unsigned
          path: client/build/outputs/apk/release/client-release-unsigned.apk
          retention-days: 90

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            app/build/reports/tests/
            client/build/reports/tests/
          retention-days: 30

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: app/build/reports/lint-results*.html
          retention-days: 30

      - name: Upload detekt results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-results
          path: |
            app/build/reports/detekt/
            client/build/reports/detekt/
          retention-days: 30

      - name: Upload kover results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kover-results
          path: |
            app/build/reports/kover/
            client/build/reports/kover/
          retention-days: 30

      - name: Quality summary
        if: always()
        run: |
          echo "## Quality Gate Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for module in app client; do
            DETEKT_XML="$module/build/reports/detekt/detekt.xml"
            if [ -f "$DETEKT_XML" ]; then
              ISSUES=$(grep -c '<error ' "$DETEKT_XML" 2>/dev/null || echo "0")
              echo "- **$module detekt:** $ISSUES issue(s)" >> $GITHUB_STEP_SUMMARY
            else
              echo "- **$module detekt:** no report" >> $GITHUB_STEP_SUMMARY
            fi
            KOVER_XML="$module/build/reports/kover/report.xml"
            if [ -f "$KOVER_XML" ]; then
              echo "- **$module kover:** report generated" >> $GITHUB_STEP_SUMMARY
            else
              echo "- **$module kover:** no report" >> $GITHUB_STEP_SUMMARY
            fi
          done
